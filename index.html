<<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>NVNE EXACT LOCK</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center}
button{margin:10px;padding:10px 20px;border-radius:8px;border:none;background:#2d6cdf;color:#fff;font-weight:bold}
canvas{max-width:100%}
</style>
</head>
<body>

<h2>NVNE Exact Skin (Locked)</h2>
<input type="file" id="upload" accept="image/*">
<br>
<button onclick="apply()">Apply Skin</button>
<br>
<canvas id="c"></canvas>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let img = new Image();

document.getElementById('upload').onchange = e=>{
  const file = e.target.files[0];
  if(!file)return;
  img.onload = ()=>{
    c.width = img.width;
    c.height = img.height;
    ctx.drawImage(img,0,0);
  };
  img.src = URL.createObjectURL(file);
};

function apply(){
  ctx.drawImage(img,0,0);

  const imageData = ctx.getImageData(0,0,c.width,c.height);
  const d = imageData.data;

  for(let i=0;i<d.length;i+=4){
    let r = d[i];
    let g = d[i+1];
    let b = d[i+2];

    // 🔒 LOCKED RAZ DETECTION (tuned for your screenshot)
    const isSkin =
      (r > 140 && r < 255 &&
       g > 80  && g < 200 &&
       b < 120);

    const isClothes =
      (r < 100 && g < 120 && b < 150);

    const isBeanieZone =
      (r > 120 && g < 80 && b < 60);

    if(isSkin){
      // keep shading but shift tone slightly
      d[i]   = r * 0.95;
      d[i+1] = g * 0.85;
      d[i+2] = b * 0.75;
    }

    if(isClothes){
      // dark hoodie look
      d[i] *= 0.25;
      d[i+1] *= 0.25;
      d[i+2] *= 0.30;
    }

    if(isBeanieZone){
      // black beanie
      d[i] *= 0.1;
      d[i+1] *= 0.1;
      d[i+2] *= 0.1;
    }
  }

  ctx.putImageData(imageData,0,0);
}
</script>

</body>
</html>
